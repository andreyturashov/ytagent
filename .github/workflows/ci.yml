name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: MyPy
        run: uv run mypy .

      - name: Tests
        run: >
          uv run pytest
          --cov=.
          --cov-report=html
          --cov-report=json

      - name: Upload Backend Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/htmlcov
            backend/coverage.json

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run lint

      - name: Tests with coverage
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Upload Frontend Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/coverage-summary.json

      - run: npm run build

  coverage-comment:
    if: github.event_name == 'pull_request'
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: backend-coverage
        path: backend-coverage

    - uses: actions/download-artifact@v4
      with:
        name: frontend-coverage
        path: frontend-coverage

    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Generate coverage report
      run: python .github/scripts/coverage_report.py

    - name: Read coverage report
      id: coverage
      shell: bash
      run: |
        echo "report<<EOF" >> "$GITHUB_OUTPUT"
        cat coverage.md >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Publish coverage comment
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: coverage
        message: |
          ${{ steps.coverage.outputs.report }}
